<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Seema Boutique</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app">
        <header class="page-header compact">
            <a href="customers.html" class="back-btn">← Back</a>
            <h1 class="page-title">📊 Dashboard</h1>
            <button class="icon-btn" onclick="refreshData()">🔄</button>
        </header>

        <div class="dashboard-container">
            <!-- Period Selector -->
            <div class="period-selector">
                <button class="period-btn active" onclick="setPeriod('week')">This Week</button>
                <button class="period-btn" onclick="setPeriod('month')">This Month</button>
                <button class="period-btn" onclick="setPeriod('year')">This Year</button>
            </div>

            <!-- Main Chart -->
            <div class="chart-card">
                <h3>Revenue Trend</h3>
                <canvas id="revenueChart"></canvas>
            </div>

            <!-- Secondary Chart -->
            <div class="chart-card">
                <h3>Orders by Status</h3>
                <canvas id="statusChart"></canvas>
            </div>

            <!-- Key Metrics -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <span class="metric-icon">👔</span>
                    <div class="metric-info">
                        <strong id="metricOrders">0</strong>
                        <span>Total Orders</span>
                    </div>
                </div>
                <div class="metric-card">
                    <span class="metric-icon">💰</span>
                    <div class="metric-info">
                        <strong id="metricRevenue">₹0</strong>
                        <span>Revenue</span>
                    </div>
                </div>
                <div class="metric-card">
                    <span class="metric-icon">📈</span>
                    <div class="metric-info">
                        <strong id="metricAvg">₹0</strong>
                        <span>Avg Order</span>
                    </div>
                </div>
                <div class="metric-card">
                    <span class="metric-icon">⏱️</span>
                    <div class="metric-info">
                        <strong id="metricPending">0</strong>
                        <span>Pending</span>
                    </div>
                </div>
            </div>

            <!-- Top Customers -->
            <div class="list-card">
                <h3>👑 Top Customers</h3>
                <div id="topCustomersList"></div>
            </div>

            <!-- Recent Activity -->
            <div class="list-card">
                <h3>🕐 Recent Activity</h3>
                <div id="recentActivityList"></div>
            </div>

            <!-- Dress Type Breakdown -->
            <div class="chart-card">
                <h3>Orders by Dress Type</h3>
                <canvas id="dressChart"></canvas>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" data-page="home">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="customers.html" class="nav-item" data-page="customers">
                <span class="nav-icon">👥</span>
                <span>Customers</span>
            </a>
            <a href="add-customer.html" class="nav-item nav-item-main" data-page="add">
                <span class="nav-icon-main">➕</span>
            </a>
            <a href="chat.html" class="nav-item" data-page="chat">
                <span class="nav-icon">💬</span>
                <span>Chat</span>
            </a>
            <a href="settings.html" class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span>More</span>
            </a>
        </nav>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        let currentPeriod = 'week';
        let revenueChart, statusChart, dressChart;

        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
        });

        function setPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadDashboard();
        }

        function loadDashboard() {
            const customers = DataManager.getCustomers();
            const filtered = filterByPeriod(customers, currentPeriod);
            
            updateMetrics(filtered);
            updateCharts(filtered);
            updateTopCustomers(filtered);
            updateRecentActivity(filtered);
        }

        function filterByPeriod(customers, period) {
            const now = new Date();
            const start = new Date();
            
            if (period === 'week') start.setDate(now.getDate() - 7);
            else if (period === 'month') start.setMonth(now.getMonth() - 1);
            else if (period === 'year') start.setFullYear(now.getFullYear() - 1);
            
            return customers.filter(c => new Date(c.createdAt) >= start);
        }

        function updateMetrics(customers) {
            const total = customers.length;
            const revenue = customers.reduce((sum, c) => sum + (c.payment?.total || 0), 0);
            const avg = total > 0 ? revenue / total : 0;
            const pending = customers.filter(c => c.orderStatus === 'pending').length;
            
            document.getElementById('metricOrders').textContent = total;
            document.getElementById('metricRevenue').textContent = '₹' + (revenue / 1000).toFixed(1) + 'k';
            document.getElementById('metricAvg').textContent = '₹' + Math.round(avg).toLocaleString();
            document.getElementById('metricPending').textContent = pending;
        }

        function updateCharts(customers) {
            // Revenue Chart
            const ctx1 = document.getElementById('revenueChart').getContext('2d');
            if (revenueChart) revenueChart.destroy();
            
            const revenueData = getRevenueByDay(customers);
            revenueChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: revenueData.labels,
                    datasets: [{
                        label: 'Revenue (₹)',
                        data: revenueData.values,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Status Chart
            const ctx2 = document.getElementById('statusChart').getContext('2d');
            if (statusChart) statusChart.destroy();
            
            const statusCounts = {
                pending: customers.filter(c => c.orderStatus === 'pending').length,
                'in-progress': customers.filter(c => c.orderStatus === 'in-progress').length,
                ready: customers.filter(c => c.orderStatus === 'ready').length,
                delivered: customers.filter(c => c.orderStatus === 'delivered').length
            };
            
            statusChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Pending', 'In Progress', 'Ready', 'Delivered'],
                    datasets: [{
                        data: Object.values(statusCounts),
                        backgroundColor: ['#f59e0b', '#3b82f6', '#22c55e', '#06b6d4']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: '#fff' } }
                    }
                }
            });

            // Dress Type Chart
            const ctx3 = document.getElementById('dressChart').getContext('2d');
            if (dressChart) dressChart.destroy();
            
            const dressTypes = {};
            customers.forEach(c => {
                dressTypes[c.dressType] = (dressTypes[c.dressType] || 0) + 1;
            });
            
            dressChart = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: Object.keys(dressTypes),
                    datasets: [{
                        label: 'Orders',
                        data: Object.values(dressTypes),
                        backgroundColor: '#a855f7'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function getRevenueByDay(customers) {
            const days = currentPeriod === 'week' ? 7 : currentPeriod === 'month' ? 30 : 12;
            const labels = [];
            const values = [];
            
            for (let i = days - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                labels.push(d.toLocaleDateString('en-US', { weekday: days === 7 ? 'short' : 'numeric' }));
                
                const dayRevenue = customers
                    .filter(c => new Date(c.createdAt).toDateString() === d.toDateString())
                    .reduce((sum, c) => sum + (c.payment?.total || 0), 0);
                values.push(dayRevenue);
            }
            
            return { labels, values };
        }

        function updateTopCustomers(customers) {
            const sorted = [...customers]
                .sort((a, b) => (b.payment?.total || 0) - (a.payment?.total || 0))
                .slice(0, 5);
            
            const container = document.getElementById('topCustomersList');
            if (sorted.length === 0) {
                container.innerHTML = '<p class="empty-list">No customers yet</p>';
                return;
            }
            
            container.innerHTML = sorted.map((c, i) => `
                <div class="list-item" onclick="viewCustomer('${c.id}')">
                    <span class="rank">${i + 1}</span>
                    <div class="item-info">
                        <strong>${c.name}</strong>
                        <span>${c.dressType || 'Unknown'}</span>
                    </div>
                    <span class="item-amount">₹${(c.payment?.total || 0).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function updateRecentActivity(customers) {
            const sorted = [...customers]
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
                .slice(0, 5);
            
            const container = document.getElementById('recentActivityList');
            container.innerHTML = sorted.map(c => `
                <div class="list-item" onclick="viewCustomer('${c.id}')">
                    <span class="activity-icon">${getStatusIcon(c.orderStatus)}</span>
                    <div class="item-info">
                        <strong>${c.name}</strong>
                        <span>${formatTimeAgo(c.createdAt)}</span>
                    </div>
                    <span class="status-badge ${c.orderStatus}">${c.orderStatus}</span>
                </div>
            `).join('');
        }

        function getStatusIcon(status) {
            const icons = { pending: '⏳', 'in-progress': '🔄', ready: '✅', delivered: '📦' };
            return icons[status] || '📋';
        }

        function formatTimeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        function viewCustomer(id) {
            window.location.href = `customer-detail.html?id=${id}`;
        }

        function refreshData() {
            loadDashboard();
            showToast('Dashboard refreshed', 'success');
        }
    </script>
</body>
</html>
